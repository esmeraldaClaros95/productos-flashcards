<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Flashcards App</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4f46e5"> 
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style>
        /* Efecto 3D para voltear la tarjeta */
        .perspective { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        /* Evita la selección de texto molesta al dar toques rápidos en el celular */
        body {
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col justify-between font-sans antialiased">

    <header class="bg-white border-b border-slate-200 py-4 px-6 shadow-sm select-none">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-slate-900 flex items-center gap-2">
                <span>🗂️</span> Flashcards Studio
            </h1>
            <span id="progress-text" class="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-full">
                Tarjeta 0 de 0
            </span>
        </div>
    </header>

    <main class="max-w-xl w-full mx-auto p-4 flex-grow flex flex-col justify-center items-center gap-6">
        
        <span id="card-category" class="text-xs font-semibold uppercase tracking-wider text-indigo-600 bg-indigo-50 px-3 py-1 rounded select-none">
            Categoría
        </span>

        <div class="perspective w-full h-80 cursor-pointer active:scale-[0.99] transition-transform duration-100" onclick="toggleCard()">
            <div id="flashcard" class="preserve-3d duration-500 w-full h-full relative transform transition-transform">
                
                <div class="backface-hidden absolute inset-0 bg-white border border-slate-200 rounded-2xl shadow-md p-6 flex flex-col justify-between items-center text-center">
                    <div class="text-slate-400 text-xs font-medium uppercase tracking-widest mt-2">Pregunta</div>
                    <p id="card-question" class="text-lg md:text-xl font-semibold text-slate-800 max-w-md overflow-y-auto my-auto px-2">¿Cargando pregunta...?</p>
                    <div class="text-slate-400 text-xs flex items-center gap-1 mb-2 select-none">
                        <span>🔄</span> Toca para voltear
                    </div>
                </div>

                <div class="backface-hidden rotate-y-180 absolute inset-0 bg-indigo-600 border border-indigo-700 rounded-2xl shadow-lg p-6 flex flex-col justify-between items-center text-center text-white">
                    <div class="text-indigo-200 text-xs font-medium uppercase tracking-widest mt-2">Respuesta</div>
                    <p id="card-answer" class="text-base md:text-lg font-medium max-w-md overflow-y-auto my-auto px-2">Cargando respuesta...</p>
                    <div class="text-indigo-200 text-xs flex items-center gap-1 mb-2 select-none">
                        <span>🔄</span> Toca para regresar
                    </div>
                </div>

            </div>
        </div>

        <div class="flex items-center gap-4 w-full justify-between px-2 select-none">
            <button onclick="prevCard()" class="flex-1 bg-white active:bg-slate-100 border border-slate-200 text-slate-700 font-semibold py-3 px-4 rounded-xl shadow-sm transition-colors cursor-pointer text-center touch-manipulation">
                ← Anterior
            </button>
            <button onclick="nextCard()" class="flex-1 bg-indigo-600 active:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-xl shadow-md transition-colors cursor-pointer text-center touch-manipulation">
                Siguiente →
            </button>
        </div>

    </main>

    <footer class="text-center py-4 text-xs text-slate-400 border-t border-slate-100 bg-white select-none hidden md:block">
        Presiona la **Barra Espaciadora** para voltear | Flechas **Izquierda/Derecha** para navegar.
    </footer>

    <script src="flashcards.js"></script>
    <script src="app.js"></script>
</body>
</html>
